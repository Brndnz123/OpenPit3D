name: Build OpenPit3D

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (GCC x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libglew-dev libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev libomp-dev curl unzip

      - name: Download SQLite amalgamation
        run: |
          mkdir -p vendor/sqlite3
          curl -L -o sqlite.zip "https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip"
          unzip -j sqlite.zip "*/sqlite3.h" "*/sqlite3.c" -d vendor/sqlite3/

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-fetchcontent-

      - name: CMake Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++ -DCMAKE_CXX_FLAGS="-O3 -march=x86-64"

      - name: CMake Build
        run: cmake --build build --parallel $(nproc)

      - name: Bundle artifact
        run: |
          mkdir -p dist
          cp build/OpenPit3D dist/
          cp collars.txt surveys.txt samples.txt lithologies.txt dist/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenPit3D-Linux-x64
          path: dist/
          if-no-files-found: error

  build-windows:
    name: Windows (MSVC x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install GLEW via vcpkg
        run: |
          vcpkg install glew:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Download SQLite amalgamation
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path vendor/sqlite3 | Out-Null
          Invoke-WebRequest -Uri "https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip" -OutFile sqlite.zip
          Expand-Archive -Path sqlite.zip -DestinationPath sqlite_tmp -Force
          Copy-Item sqlite_tmp\*\sqlite3.h vendor\sqlite3\
          Copy-Item sqlite_tmp\*\sqlite3.c vendor\sqlite3\

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-fetchcontent-

      - name: CMake Configure
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$toolchain"

      - name: CMake Build
        run: cmake --build build --config Release --parallel

      - name: Bundle artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\OpenPit3D.exe dist\
          Copy-Item collars.txt, surveys.txt, samples.txt, lithologies.txt dist\
          $glew = Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" -Filter "glew32.dll" -Recurse | Select-Object -First 1
          if ($glew) { Copy-Item $glew.FullName dist\ }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenPit3D-Windows-x64
          path: dist/
          if-no-files-found: error
